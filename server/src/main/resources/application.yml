spring:
  application:
    name: maple-daily-log-server
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: ${FLYWAY_ENABLED:false}

maple:
  admin-token: ${ADMIN_TOKEN}
  nexon-api-key: ${NEXON_API_KEY}
  timezone: Asia/Seoul
  nexon-rate-limit:
    requests-per-second: ${NEXON_REQUESTS_PER_SECOND:5}
    requests-per-day: ${NEXON_REQUESTS_PER_DAY:1000}
